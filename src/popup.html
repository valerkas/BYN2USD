<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BYN to USD</title>
    <style>
      body {
        margin: 0;
        min-width: 260px;
        padding: 12px;
        font-family: Arial, sans-serif;
        color: #1f2937;
        background: #f9fafb;
      }

      .title {
        margin: 0 0 10px;
        font-size: 16px;
      }

      .card {
        background: #ffffff;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        padding: 10px;
      }

      .label {
        margin: 0 0 6px;
        color: #6b7280;
        font-size: 12px;
      }

      .value {
        margin: 0;
        font-size: 20px;
        font-weight: 700;
      }

      .note {
        margin-top: 8px;
        font-size: 12px;
        color: #6b7280;
      }

      .error {
        color: #b91c1c;
      }
    </style>
  </head>
  <body>
    <h1 class="title">BYN → USD</h1>
    <div class="card">
      <p class="label">Курс НБРБ (BYN за 1 USD)</p>
      <p id="rate" class="value">...</p>
      <p class="note">Пересчёт цен выполняется автоматически на странице.</p>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
